<button id="back-to-top" class="back-to-top" type="button" aria-label="回到顶部" title="回到顶部">
    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M6 14.5 12 8l6 6.5" />
    </svg>
</button>

<script>
    (function () {
        'use strict';

        const menuToggle = document.querySelector('.site-menu-toggle');
        const nav = document.getElementById('primary-navigation');
        const reduceMotionQuery = window.matchMedia('(prefers-reduced-motion: reduce)');

        function setMenuOpen(open) {
            if (!menuToggle || !nav) return;
            menuToggle.classList.toggle('is-open', open);
            nav.classList.toggle('is-open', open);
            document.body.classList.toggle('site-nav-open', open);
            menuToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
        }

        if (menuToggle && nav) {
            menuToggle.addEventListener('click', function (event) {
                event.stopPropagation();
                setMenuOpen(!nav.classList.contains('is-open'));
            });

            nav.querySelectorAll('a').forEach(function (link) {
                link.addEventListener('click', function () {
                    setMenuOpen(false);
                });
            });

            document.addEventListener('keydown', function (event) {
                if (event.key === 'Escape') setMenuOpen(false);
            });

            document.addEventListener('click', function (event) {
                if (!document.body.classList.contains('site-nav-open')) return;
                if (nav.contains(event.target) || menuToggle.contains(event.target)) return;
                setMenuOpen(false);
            });

            const desktopQuery = window.matchMedia('(min-width: 921px)');
            const closeMenuOnDesktop = function (event) {
                if (event.matches) setMenuOpen(false);
            };

            if (desktopQuery.addEventListener) {
                desktopQuery.addEventListener('change', closeMenuOnDesktop);
            } else if (desktopQuery.addListener) {
                desktopQuery.addListener(closeMenuOnDesktop);
            }
        }

        const backToTop = document.getElementById('back-to-top');

        if (backToTop) {
            function updateBackToTop() {
                backToTop.classList.toggle('is-visible', window.scrollY > 420);
            }

            backToTop.addEventListener('click', function () {
                window.scrollTo({ top: 0, behavior: reduceMotionQuery.matches ? 'auto' : 'smooth' });
            });

            window.addEventListener('scroll', updateBackToTop, { passive: true });
            updateBackToTop();
        }

        function initStaffParallax() {
            const staff = document.querySelector('.music-staff-bg');
            if (!staff || reduceMotionQuery.matches) return;

            let ticking = false;

            function updateStaffPosition() {
                const shift = Math.max(-5, Math.min(5, window.scrollY * -0.012));
                staff.style.transform = 'translate3d(0, ' + shift.toFixed(2) + 'px, 0)';
                ticking = false;
            }

            function requestStaffUpdate() {
                if (ticking) return;
                ticking = true;
                window.requestAnimationFrame(updateStaffPosition);
            }

            staff.classList.add('is-parallax-ready');
            window.addEventListener('scroll', requestStaffUpdate, { passive: true });
            updateStaffPosition();
        }

        function initRevealOnScroll() {
            if (reduceMotionQuery.matches || !('IntersectionObserver' in window)) return;

            const revealSelectors = [
                '.section-band',
                '.featured-section',
                '.blog-card',
                '.post-tools',
                '.article-detail__header',
                '.article-detail__cover',
                '.article-detail__content > p',
                '.author-card',
                '.article-related',
                '.about-values article',
                '.about-milestones__track li',
                '.journal-entry',
                '.music-panel',
                '.curated-inspirations',
                '.contact-form',
                '.contact-links',
                '.contact-faq'
            ];

            const targets = Array.prototype.slice.call(document.querySelectorAll(revealSelectors.join(',')));
            if (!targets.length) return;

            const observer = new IntersectionObserver(function (entries) {
                entries.forEach(function (entry) {
                    if (!entry.isIntersecting) return;
                    entry.target.classList.add('is-visible');
                    observer.unobserve(entry.target);
                });
            }, {
                rootMargin: '0px 0px -8% 0px',
                threshold: 0.12
            });

            targets.forEach(function (target, index) {
                target.classList.add('reveal-on-scroll');
                target.style.setProperty('--reveal-delay', Math.min(index % 5, 4) * 45 + 'ms');
                observer.observe(target);
            });
        }

        initStaffParallax();
        initRevealOnScroll();

        window.requestAnimationFrame(function () {
            document.body.classList.add('is-loaded');
        });
    })();
</script>
