<button id="back-to-top" class="back-to-top" type="button" aria-label="回到顶部" title="回到顶部">
    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M6 14.5 12 8l6 6.5" />
    </svg>
</button>

<script>
    (function () {
        'use strict';

        const menuToggle = document.querySelector('.site-menu-toggle');
        const nav = document.getElementById('primary-navigation');
        const reduceMotionQuery = window.matchMedia('(prefers-reduced-motion: reduce)');

        function setMenuOpen(open) {
            if (!menuToggle || !nav) return;
            menuToggle.classList.toggle('is-open', open);
            nav.classList.toggle('is-open', open);
            document.body.classList.toggle('site-nav-open', open);
            menuToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
        }

        if (menuToggle && nav) {
            menuToggle.addEventListener('click', function (event) {
                event.stopPropagation();
                setMenuOpen(!nav.classList.contains('is-open'));
            });

            nav.querySelectorAll('a').forEach(function (link) {
                link.addEventListener('click', function () {
                    setMenuOpen(false);
                });
            });

            document.addEventListener('keydown', function (event) {
                if (event.key === 'Escape') setMenuOpen(false);
            });

            document.addEventListener('click', function (event) {
                if (!document.body.classList.contains('site-nav-open')) return;
                if (nav.contains(event.target) || menuToggle.contains(event.target)) return;
                setMenuOpen(false);
            });

            const desktopQuery = window.matchMedia('(min-width: 921px)');
            const closeMenuOnDesktop = function (event) {
                if (event.matches) setMenuOpen(false);
            };

            if (desktopQuery.addEventListener) {
                desktopQuery.addEventListener('change', closeMenuOnDesktop);
            } else if (desktopQuery.addListener) {
                desktopQuery.addListener(closeMenuOnDesktop);
            }
        }

        const backToTop = document.getElementById('back-to-top');

        if (backToTop) {
            function updateBackToTop() {
                backToTop.classList.toggle('is-visible', window.scrollY > 420);
            }

            backToTop.addEventListener('click', function () {
                window.scrollTo({ top: 0, behavior: reduceMotionQuery.matches ? 'auto' : 'smooth' });
            });

            window.addEventListener('scroll', updateBackToTop, { passive: true });
            updateBackToTop();
        }

        function initStaffParallax() {
            const staff = document.querySelector('.music-staff-bg');
            if (!staff || reduceMotionQuery.matches) return;

            let ticking = false;

            function updateStaffPosition() {
                const shift = Math.max(-5, Math.min(5, window.scrollY * -0.012));
                staff.style.transform = 'translate3d(0, ' + shift.toFixed(2) + 'px, 0)';
                ticking = false;
            }

            function requestStaffUpdate() {
                if (ticking) return;
                ticking = true;
                window.requestAnimationFrame(updateStaffPosition);
            }

            staff.classList.add('is-parallax-ready');
            window.addEventListener('scroll', requestStaffUpdate, { passive: true });
            updateStaffPosition();
        }

        function initArticleTocHover() {
            const toc = document.querySelector('[data-article-toc]');
            const articleMain = document.querySelector('.article-detail__main');
            if (!toc || !articleMain) return;

            const toggle = toc.querySelector('[data-article-toc-toggle]');
            let lockedOpen = false;

            function setVisible(visible) {
                document.body.classList.toggle('is-article-toc-visible', visible);
                if (toggle) {
                    toggle.setAttribute('aria-expanded', visible ? 'true' : 'false');
                    toggle.setAttribute('aria-label', visible ? '隐藏文章目录' : '显示文章目录');
                }
            }

            function getLeftRevealZone() {
                return Math.min(380, Math.max(280, window.innerWidth * 0.22));
            }

            function isInsideReadingColumn(x, y) {
                const rect = articleMain.getBoundingClientRect();
                const top = Math.min(rect.top, 0) - 48;
                const bottom = Math.max(rect.bottom, window.innerHeight) + 48;

                return x >= rect.left - 72 && x <= rect.right + 32 && y >= top && y <= bottom;
            }

            document.addEventListener('pointermove', function (event) {
                if (lockedOpen) return;
                setVisible(event.clientX <= getLeftRevealZone() || isInsideReadingColumn(event.clientX, event.clientY));
            }, { passive: true });

            document.addEventListener('pointerleave', function () {
                if (!lockedOpen) setVisible(false);
            });

            toc.addEventListener('focusin', function () {
                setVisible(true);
            });

            toc.addEventListener('focusout', function (event) {
                if (lockedOpen || toc.contains(event.relatedTarget)) return;
                setVisible(false);
            });

            if (toggle) {
                toggle.addEventListener('click', function () {
                    const isVisible = document.body.classList.contains('is-article-toc-visible');
                    if (lockedOpen && isVisible) {
                        lockedOpen = false;
                        setVisible(false);
                        return;
                    }

                    lockedOpen = true;
                    setVisible(true);
                });
            }

            document.addEventListener('click', function (event) {
                if (!lockedOpen) return;
                if (toc.contains(event.target) || articleMain.contains(event.target)) return;
                lockedOpen = false;
                setVisible(false);
            });

            document.addEventListener('keydown', function (event) {
                if (event.key !== 'Escape') return;
                lockedOpen = false;
                setVisible(false);
            });
        }

        function initRevealOnScroll() {
            if (reduceMotionQuery.matches || !('IntersectionObserver' in window)) return;

            const revealSelectors = [
                '.section-band',
                '.featured-section',
                '.blog-card',
                '.post-tools',
                '.article-detail__content > *',
                '.article-detail__footer',
                '.about-values article',
                '.about-milestones__track li',
                '.journal-entry',
                '.music-panel',
                '.curated-inspirations'
            ];

            const targets = Array.prototype.slice.call(document.querySelectorAll(revealSelectors.join(',')));
            if (!targets.length) return;

            const observer = new IntersectionObserver(function (entries) {
                entries.forEach(function (entry) {
                    if (!entry.isIntersecting) return;
                    entry.target.classList.add('is-visible');
                    observer.unobserve(entry.target);
                });
            }, {
                rootMargin: '0px 0px -8% 0px',
                threshold: 0.12
            });

            targets.forEach(function (target, index) {
                target.classList.add('reveal-on-scroll');
                target.style.setProperty('--reveal-delay', Math.min(index % 5, 4) * 45 + 'ms');
                observer.observe(target);
            });
        }

        initStaffParallax();
        initArticleTocHover();
        initRevealOnScroll();

        window.requestAnimationFrame(function () {
            document.body.classList.add('is-loaded');
        });
    })();
</script>
